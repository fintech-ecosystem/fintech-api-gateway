spring:
  application:
    name: fintech-api-gateway
  autoconfigure:
    exclude:
      - org.springframework.boot.security.autoconfigure.ReactiveUserDetailsServiceAutoConfiguration
  main:
    web-application-type: reactive
  cloud:
    gateway:
      server:
        webflux:
          default-filters:
            - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin
            - AddResponseHeader=X-Gateway-Name, fintech-api-gateway
          routes:
            - id: auth-service
              uri: ${AUTH_SERVICE_URI:http://localhost:8081}
              predicates:
                - Path=/api/auth/**
              filters:
                - StripPrefix=1

            - id: user-service
              uri: ${USER_SERVICE_URI:http://localhost:8082}
              predicates:
                - Path=/api/users/**
              filters:
                - StripPrefix=1

            - id: kyc-service
              uri: ${KYC_SERVICE_URI:http://localhost:8083}
              predicates:
                - Path=/api/kyc/**
              filters:
                - StripPrefix=1

            - id: wallet-service
              uri: ${WALLET_SERVICE_URI:http://localhost:8084}
              predicates:
                - Path=/api/wallets/**
              filters:
                - StripPrefix=1

            - id: ledger-service
              uri: ${LEDGER_SERVICE_URI:http://localhost:8085}
              predicates:
                - Path=/api/ledger/**
              filters:
                - StripPrefix=1

            - id: payment-service
              uri: ${PAYMENT_SERVICE_URI:http://localhost:8086}
              predicates:
                - Path=/api/payments/**
              filters:
                - StripPrefix=1

            - id: risk-service
              uri: ${RISK_SERVICE_URI:http://localhost:8087}
              predicates:
                - Path=/api/risk/**
              filters:
                - StripPrefix=1

            - id: loan-service
              uri: ${LOAN_SERVICE_URI:http://localhost:8088}
              predicates:
                - Path=/api/loans/**
              filters:
                - StripPrefix=1

server:
  port: ${SERVER_PORT:8080}

security:
  jwt:
    issuer: ${JWT_ISSUER:fintech-auth-service}
    secret: ${JWT_SECRET:change-me-to-a-long-random-secret-at-least-32-chars}

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway,metrics
  endpoint:
    gateway:
      enabled: true
    health:
      show-details: always

logging:
  level:
    root: INFO
    org.springframework.cloud.gateway: INFO
    reactor.netty.http.client: INFO
